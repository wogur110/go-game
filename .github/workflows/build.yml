name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to publish a Release on tag

jobs:
  test:
    name: Test + build-smoke (Linux, no GPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: System libs for headless Qt
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install deps (no CUDA wheels needed for the engine-free check)
        run: python -m pip install "PySide6>=6.6" "sgfmill>=1.1.1"
      - name: Rules + SGF tests
        run: |
          python tests/test_goban.py
          python tests/test_sgf.py
      - name: Engine-free build smoke
        env:
          QT_QPA_PLATFORM: offscreen
        run: python main.py --build-smoke

  build-windows:
    name: Build Windows executable
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps + PyInstaller
        run: python -m pip install -r requirements.txt pyinstaller
      - name: Build
        run: python -m PyInstaller --noconfirm baduk_studio.spec
      - name: Smoke-test the built exe (no GPU)
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          $p = Start-Process -FilePath "dist\BadukStudio\BadukStudio.exe" -ArgumentList "--build-smoke" -PassThru -Wait
          if ($p.ExitCode -ne 0) {
            Get-Content "dist\BadukStudio\build_smoke_error.log" -ErrorAction SilentlyContinue
            exit $p.ExitCode
          }
      - name: Bundle the engine downloader
        shell: pwsh
        run: Copy-Item packaging\download-engine.bat dist\BadukStudio\download-engine.bat
      - name: Version label
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") { $v = "${{ github.ref_name }}" }
          else { $v = "dev-$($env:GITHUB_SHA.Substring(0,7))" }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path dist\BadukStudio\* -DestinationPath "BadukStudio-windows-x64-${{ steps.ver.outputs.version }}.zip"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BadukStudio-windows-x64-${{ steps.ver.outputs.version }}
          path: BadukStudio-windows-x64-*.zip
      - name: Publish release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: BadukStudio-windows-x64-*.zip
