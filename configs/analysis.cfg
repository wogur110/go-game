# KataGo analysis-engine config — Baduk Studio
# Used by: katago analysis -config configs/analysis.cfg -model models/<b28>.bin.gz
# The GPU backend (CUDA / TensorRT / OpenCL / Eigen) is baked into the katago
# binary you downloaded; this file only tunes search, batching and logging.

# --- Logging: keep stdout clean for JSON; logs go to a directory --------------
logDir = analysis_logs
logAllRequests = false
logAllResponses = false
logSearchInfo = false
logToStderr = false

# --- Reporting ----------------------------------------------------------------
# Report winrate/score from Black's perspective so the eval bar has a fixed
# reference regardless of whose turn it is.
reportAnalysisWinratesAs = BLACK

# --- Search parallelism -------------------------------------------------------
# numAnalysisThreads  = concurrent queries (2 so continuous live analysis and a
#   one-shot score estimate can run at the same time).
# numSearchThreadsPerAnalysisThread = MCTS threads per query (raise on big GPUs).
numAnalysisThreads = 2
numSearchThreadsPerAnalysisThread = 12

# --- Neural net batching / caches --------------------------------------------
nnMaxBatchSize = 32
nnCacheSizePowerOfTwo = 20
nnMutexPoolSizePowerOfTwo = 16

# --- Default search cap (overridden per query via "maxVisits") ----------------
maxVisits = 800
