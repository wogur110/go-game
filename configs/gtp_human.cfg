# KataGo GTP config — human-like opponent (Baduk Studio)
# Based on KataGo's official gtp_human5k_example.cfg, tuned for the app.
# Launch: katago gtp -model models/<b28> -human-model models/b18c384nbt-humanv0.bin.gz \
#                    -config configs/gtp_human.cfg -override-config humanSLProfile=rank_5k
# The app sets humanSLProfile per chosen rank at launch and boardsize/komi/rules live over GTP.

# --- Logging (keep stdout clean for GTP; logs go to a directory) --------------
logDir = gtp_logs
logAllGTPCommunication = false
logSearchInfo = false
logSearchInfoForChosenMove = false
logToStderr = false

# Default rules (a GUI overrides this live via kata-set-rules / komi / boardsize).
rules = chinese

# When imitating a weaker human, only resign when clearly, persistently lost.
allowResignation = true
resignThreshold = -0.99
resignConsecTurns = 20
resignMinScoreDifference = 40
resignMinMovesPerBoardArea = 0.4

# Low visits: the human SL policy drives move choice; visits just sanity-check pass/resign.
maxVisits = 40
numSearchThreads = 1
lagBuffer = 1.0

# The app controls move pacing, so don't add KataGo's random "thinking" delay.
delayMoveScale = 0.0
delayMoveMax = 0.0

# ===========================================================================
# HUMAN SL PARAMETERS
# ===========================================================================
# humanSLProfile picks which players to imitate. Overridden per-rank at launch.
# Valid: rank_20k..rank_9d (post-AlphaZero), preaz_* (pre-AZ), proyear_1800..2023.
humanSLProfile = rank_5k

# Always play a human-like move (before temperature).
humanSLChosenMoveProp = 1.0
# Let KataGo (not the human net) decide when to pass — the human net can be unreliable about passing.
humanSLChosenMoveIgnorePass = true
# Large value effectively disables Pikl suppression (pure imitation at these low visits).
humanSLChosenMovePiklLambda = 100000000

# Use the human policy for exploration during search (off by default at low visits).
humanSLRootExploreProbWeightless = 0.0
humanSLRootExploreProbWeightful = 0.0
humanSLPlaExploreProbWeightless = 0.0
humanSLPlaExploreProbWeightful = 0.0
humanSLOppExploreProbWeightless = 0.0
humanSLOppExploreProbWeightful = 0.0
humanSLCpuctExploration = 0.50
humanSLCpuctPermanent = 0.2

# ===========================================================================
# MOVE SELECTION / SEARCH TUNING (from the official human example)
# ===========================================================================
# Temperature near 1, only damping moves already below 1% — sample the human range.
chosenMoveTemperatureEarly = 0.85
chosenMoveTemperature = 0.70
chosenMoveTemperatureHalflife = 80
chosenMoveTemperatureOnlyBelowProb = 0.01
chosenMoveSubtract = 0
chosenMovePrune = 0

# Small NN cache (we use very low visits).
nnCacheSizePowerOfTwo = 17
nnMutexPoolSizePowerOfTwo = 14

# Take recent moves into account (better human imitation).
ignorePreRootHistory = false
analysisIgnorePreRootHistory = false

# Smoother root probabilities; disable LCB/uncertainty/bias tricks that distort human blending.
rootNumSymmetriesToSample = 2
useLcbForSelection = false
winLossUtilityFactor = 1.0
staticScoreUtilityFactor = 0.30
dynamicScoreUtilityFactor = 0.00
useUncertainty = false
subtreeValueBiasFactor = 0.0
useNoisePruning = false
